name: OGB Logic Tests

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  logic-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov
          pip install \
            "pymodbus>=3.11.2,<4.0.0" \
            "cryptography>=45.0.7,<47.0.0" \
            "python-socketio>=5.10.0,<6.0.0" \
            "aiohttp>=3.12.15,<4.0.0"

      - name: Run OGB logic tests
        run: |
          pytest tests/logic -q --maxfail=1 --disable-warnings --cov=custom_components/opengrowbox/OGBController --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ogb-logic-coverage-py${{ matrix.python-version }}
          path: coverage.xml
